# ----------------------------------------
# CORE APPLICATION
# ----------------------------------------
# Sets the port your application will run on
server.port=8080

# ----------------------------------------
# POSTGRESQL DATASOURCE
# ----------------------------------------
# The JDBC URL for your database
spring.datasource.url=jdbc:postgresql://localhost:5432/peertutor_db

# Your PostgreSQL username and password
spring.datasource.username=postgres
spring.datasource.password=root

# The driver class for PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ----------------------------------------
# JPA / HIBERNATE CONFIGURATION
# ----------------------------------------
# 'update': Updates the schema if it changes. Good for development, but requires caution.
# If you continue to see schema errors (like the OID error), consider using 'create' once to fix the schema.
spring.jpa.hibernate.ddl-auto=update

# The specific SQL dialect for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Set to 'true' to see all executed SQL queries in your console (good for debugging)
spring.jpa.show-sql=true

# Formats the SQL output in the console to be more readable
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------
# APPLICATION NOTES
# ----------------------------------------
# 💡 NOTE: If you are unable to fix the final recurring schema error 
# (e.g., 'character varying >= integer' after manually running ALTER TABLE), 
# temporarily change ddl-auto to 'create' to force Hibernate to rebuild a clean schema.
# spring.jpa.hibernate.ddl-auto=create